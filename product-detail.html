<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk | Heavenly Wear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'soft-cream': '#FDFCFB', 'soft-beige': '#F3F0EC', 'soft-rose': '#E6DED8', 'elegant-brown': '#8C786A', 'elegant-dark': '#3A3532', } } } }
    </script>
</head>
<body class="bg-soft-cream">
    <div id="product-page" class="max-w-7xl mx-auto px-6 py-20">
        </div>

    <script>
        const db = {
            sport: { name: "Hijab Sport Premium", price: 40000, img: "images/hijab-sport.jpeg", desc: "Dibuat dengan teknologi Cool-Max Jersey, hijab ini memastikan sirkulasi udara maksimal saat beraktivitas fisik. Tekstur elastis, ringan, dan tidak berbau keringat.", colors: ["Deep Black", "Navy Mist", "Charcoal", "Soft Maroon"], reviews: ["Nyaman bgt buat lari pagi! - Sarah", "Gak bikin gerah sama sekali. - Rani"] },
            voal: { name: "Hijab Segi Empat Voal", price: 35000, img: "images/segiempat-voal.jpeg", desc: "Bahan Voal Ultra-Fine dengan finishing Lasercut premium. Sangat tegak di dahi, tidak mudah kusut, dan memiliki serat yang sangat halus.", colors: ["Nude", "Dusty Pink", "Sage Green", "Earth Mocca"], reviews: ["Warnanya cantik bgt aslinya. - Linda"] },
            viscose: { name: "Hijab Pashmina Viscose", price: 45000, img: "images/pashmina-viscose.jpeg", desc: "Pashmina Ironless berbahan serat Viscose alami. Tekstur jatuh (flowy), adem, dan memberikan kesan elegan tanpa perlu disetrika.", colors: ["Terracotta", "Olive Oil", "Denim Cloud", "Sand Beige"], reviews: ["Gak perlu ribet setrika, praktis! - Devi"] },
            ceruty: { name: "Hijab Pashmina Ceruty", price: 42000, img: "images/pashmina-ceruty.jpeg", desc: "Ceruty Babydoll Armani original. Memiliki tekstur pasir yang mewah dan mudah diatur untuk berbagai gaya tutorial hijab.", colors: ["Lavender Sky", "Dusty Blue", "Rosewood", "Cream Cheese"], reviews: ["Bahannya jatuh banget, suka. - Maya"] }
        };

        const params = new URLSearchParams(window.location.search);
        const pid = params.get('id');
        const p = db[pid];

        if(p) {
            document.getElementById('product-page').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-20">
                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-soft-beige">
                        <img src="${p.img}" class="w-full rounded-2xl">
                    </div>
                    <div>
                        <h1 class="text-5xl font-serif mb-4">${p.name}</h1>
                        <p class="text-3xl text-elegant-brown font-medium mb-10">Rp ${p.price.toLocaleString()}</p>
                        
                        <div class="mb-8">
                            <label class="block text-xs font-bold uppercase mb-4 tracking-widest text-elegant-brown">Pilihan Warna</label>
                            <div class="flex flex-wrap gap-3">
                                ${p.colors.map(c => `<button class="color-btn border border-soft-rose px-5 py-2 rounded-full text-sm hover:bg-elegant-dark hover:text-white transition">${c}</button>`).join('')}
                            </div>
                        </div>

                        <div class="mb-10">
                            <label class="block text-xs font-bold uppercase mb-4 tracking-widest text-elegant-brown">Jumlah</label>
                            <div class="flex items-center space-x-4">
                                <input type="number" id="qty" value="1" min="1" class="w-24 bg-white border border-soft-beige p-3 rounded-xl text-center">
                            </div>
                        </div>

                        <p class="text-elegant-dark/80 leading-relaxed mb-10 italic">"${p.desc}"</p>

                        <div class="flex gap-4">
                            <button onclick="addToCart('${pid}')" class="flex-1 bg-elegant-dark text-white py-5 rounded-full font-bold text-xs tracking-widest hover:bg-elegant-brown transition shadow-xl">MASUK KERANJANG</button>
                            <button onclick="buyNow('${pid}')" class="flex-1 border-2 border-elegant-dark py-5 rounded-full font-bold text-xs tracking-widest hover:bg-elegant-dark hover:text-white transition">BELI SEKARANG</button>
                        </div>

                        <div class="mt-20 border-t border-soft-beige pt-10">
                            <h3 class="text-2xl font-serif mb-6 italic">Ulasan Pelanggan Puas</h3>
                            <div class="space-y-4">
                                ${p.reviews.map(r => `<div class="p-4 bg-white rounded-2xl text-sm italic border-l-4 border-elegant-brown">"${r}"</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        let activeColor = '';
        document.addEventListener('click', e => {
            if(e.target.classList.contains('color-btn')) {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('bg-elegant-dark', 'text-white'));
                e.target.classList.add('bg-elegant-dark', 'text-white');
                activeColor = e.target.innerText;
            }
        });

        function addToCart(id) {
            if(!activeColor) return alert("Pilih warna terlebih dahulu!");
            let cart = JSON.parse(localStorage.getItem('heavenly_cart') || '[]');
            cart.push({ ...db[id], id, selectedColor: activeColor, qty: document.getElementById('qty').value });
            localStorage.setItem('heavenly_cart', JSON.stringify(cart));
            window.location.href = 'cart.html';
        }

        function buyNow(id) {
            addToCart(id);
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
